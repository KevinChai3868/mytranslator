services:
  - type: web
    name: my-translator
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: TRANSLATION_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_VISION_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_TTS_MODEL
        value: gpt-4o-mini-tts
      - key: OPENAI_TTS_VOICE
        value: alloy
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
